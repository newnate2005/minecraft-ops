---
- name: Configure Minecraft server
  hosts: minecraft
  become: true

  vars:
    aws_account_id: "238039006137"
    ecr_image: "minecraft-server:mc-1.21.11-build2"
    mc_version: "1.21.11"
    s3_bucket: "minecraft-backups-238039006137"

  pre_tasks:
    - name: Wait for SSH to be ready
      wait_for_connection:
        delay: 10
        timeout: 120

    - name: Gather facts
      gather_facts:

  tasks:
    - name: Install k3s
      shell: curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable=traefik" sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for k3s to be ready
      shell: kubectl get nodes
      register: k3s_ready
      until: "'Ready' in k3s_ready.stdout"
      retries: 12
      delay: 10
      changed_when: false

    - name: Create .kube directory for ubuntu user
      file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Copy kubeconfig for ubuntu user
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /home/ubuntu/.kube/config
        owner: ubuntu
        group: ubuntu
        mode: '0600'
        remote_src: true

    - name: Set KUBECONFIG in .bashrc
      lineinfile:
        path: /home/ubuntu/.bashrc
        line: 'export KUBECONFIG=/home/ubuntu/.kube/config'
        state: present

    - name: Install AWS CLI
      snap:
        name: aws-cli
        classic: true
        state: present

    - name: Copy backup script to server
      copy:
        src: ../scripts/backup.sh
        dest: /home/ubuntu/backup.sh
        mode: '0755'

    - name: Schedule daily backup via cron
      cron:
        name: "minecraft world backup"
        hour: "3"
        minute: "0"
        job: "/home/ubuntu/backup.sh >> /var/log/minecraft-backup.log 2>&1"
        user: root

    - name: Authenticate ECR for containerd
      shell: |
        mkdir -p /root/.docker
        aws ecr get-login-password --region us-east-1 | \
        python3 -c "
        import sys, json, base64
        token = sys.stdin.read().strip()
        creds = base64.b64encode(b'AWS:' + token.encode()).decode()
        config = {
          'auths': {
            '238039006137.dkr.ecr.us-east-1.amazonaws.com': {
              'auth': creds
            }
          }
        }
        print(json.dumps(config))
        " > /root/.docker/config.json
      changed_when: false

    - name: Copy Kubernetes manifests
      copy:
        src: minecraft.yml
        dest: /home/ubuntu/minecraft.yml
        mode: '0644'

    - name: Apply Kubernetes manifests
      shell: kubectl apply -f /home/ubuntu/minecraft.yml
      changed_when: false

    - name: Wait for PVC to be bound
      shell: kubectl get pvc minecraft-data -o jsonpath='{.status.phase}'
      register: pvc_status
      until: pvc_status.stdout == "Bound"
      retries: 12
      delay: 5
      changed_when: false

    - name: Get PVC host path
      shell: |
        kubectl get pvc minecraft-data -o jsonpath='{.spec.volumeName}' | \
        xargs -I{} find /var/lib/rancher/k3s/storage -maxdepth 1 -name "{}*" -type d
      register: pvc_path
      changed_when: false

    - name: Get latest backup from S3
      shell: aws s3 ls s3://{{ s3_bucket }}/backups/ | sort | tail -1 | awk '{print $4}'
      register: latest_backup
      changed_when: false

    - name: Restore world from S3
      shell: |
        aws s3 cp s3://{{ s3_bucket }}/backups/{{ latest_backup.stdout }} /tmp/world-backup.tar.gz
        rm -rf {{ pvc_path.stdout }}/world
        tar -xzf /tmp/world-backup.tar.gz -C {{ pvc_path.stdout }}
      args:
        creates: "{{ pvc_path.stdout }}/world"
      when:
        - latest_backup.stdout | length > 0
        - pvc_path.stdout | length > 0